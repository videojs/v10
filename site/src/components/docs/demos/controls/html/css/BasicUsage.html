<video-player class="video-player">
    <media-container>
        <video
            src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4"
            autoplay
            muted
            playsinline
            loop
        ></video>

        <media-controls class="media-controls">
            <media-controls-group class="media-controls-group" aria-label="Playback controls">
                <media-play-button class="media-play-button play">
                    <span class="show-when-paused">Play</span>
                    <span class="show-when-playing">Pause</span>
                </media-play-button>
                <media-time class="media-time" type="current"></media-time>
            </media-controls-group>
        </media-controls>
    </media-container>
</video-player>
