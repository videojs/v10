<media-tooltip-group class="html-tooltip-grouping" timeout="1000">
    <button type="button" commandfor="tooltip-bold" class="html-tooltip-grouping__trigger">Bold</button>
    <media-tooltip id="tooltip-bold" class="html-tooltip-grouping__popup">Toggle bold</media-tooltip>

    <button type="button" commandfor="tooltip-italic" class="html-tooltip-grouping__trigger">Italic</button>
    <media-tooltip id="tooltip-italic" class="html-tooltip-grouping__popup">Toggle italic</media-tooltip>

    <button type="button" commandfor="tooltip-underline" class="html-tooltip-grouping__trigger">Underline</button>
    <media-tooltip id="tooltip-underline" class="html-tooltip-grouping__popup">Toggle underline</media-tooltip>
</media-tooltip-group>
