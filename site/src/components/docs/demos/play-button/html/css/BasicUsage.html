<video-player class="video-player">
    <media-container>
        <video
            src="{{VJS10_DEMO_VIDEO_MP4}}"
            autoplay
            muted
            playsinline
        ></video>
        <media-play-button class="media-play-button">
            <span class="paused">Play</span>
            <span class="playing">Pause</span>
            <span class="ended">Replay</span>
        </media-play-button>
    </media-container>
</video-player>
