<video-player class="video-player">
    <media-container>
        <hlsjs-video
            src="{{VJS10_DEMO_VIDEO_HLS}}"
            autoplay
            muted
            playsinline
            loop
        ></hlsjs-video>

            <span class="connected">Stop casting</span>

    </media-container>
</video-player>
