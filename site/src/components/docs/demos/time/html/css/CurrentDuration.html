<video-player class="video-player">
    <media-container>
        <video
            src="{{VJS10_DEMO_VIDEO_MP4}}"
            autoplay
            muted
            playsinline
            loop
        ></video>
        <media-time-group class="time-group">
            <media-time type="current"></media-time>
            <media-time-separator></media-time-separator>
            <media-time type="duration"></media-time>
        </media-time-group>
    </media-container>
</video-player>
