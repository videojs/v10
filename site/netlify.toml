[build]
  command = "pnpm build:site"
  publish = "site/dist"
  ignore = "pnpm dlx turbo-ignore site --task=build --fallback=origin/main"

# Redirect old theme demo pages to home
[[redirects]]
  from = "/city"
  to = "/"
  status = 308

[[redirects]]
  from = "/fantasy"
  to = "/"
  status = 308

[[redirects]]
  from = "/forest"
  to = "/"
  status = 308

[[redirects]]
  from = "/sea"
  to = "/"
  status = 308

# Redirect old v8 guides to legacy site
[[redirects]]
  from = "/guides"
  to = "https://legacy.videojs.org/guides"
  status = 308

[[redirects]]
  from = "/guides/*"
  to = "https://legacy.videojs.org/guides/:splat"
  status = 308

# Redirect old tags pages to blog (no tag filtering in v10)
[[redirects]]
  from = "/tags"
  to = "/blog"
  status = 307

[[redirects]]
  from = "/tags/*"
  to = "/blog"
  status = 307

# Redirect old support URL to new page
[[redirects]]
  from = "/html5-video-support"
  to = "/support"
  status = 307

# Misc v8 stragglers
[[redirects]]
  from = "/getting-started"
  to = "/docs"
  status = 307

[[redirects]]
  from = "/advanced"
  to = "/docs"
  status = 307

[[redirects]]
  from = "/plugins"
  to = "/docs"
  status = 307
